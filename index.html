<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korboify</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    flex:1;
    display:flex;
    overflow:hidden;
}

.sidebar{
    width:240px;
    background:#000;
    padding:20px;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#1DB954;
    margin-bottom:30px;
}

.nav-item{
    padding:12px 0;
    color:#b3b3b3;
    cursor:pointer;
}

.nav-item:hover{
    color:white;
}

.main{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    margin-bottom:25px;
    font-size:16px;
}

.section-title{
    margin-bottom:15px;
    margin-top:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    border-radius:10px;
    padding:15px;
    transition:.2s;
}

.card:hover{
    background:#282828;
}

.cover{
    width:100%;
    aspect-ratio:1;
    background:#333;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
}

.song{
    font-weight:bold;
    margin-bottom:5px;
}

.artist{
    color:#b3b3b3;
    font-size:14px;
}

.player{
    height:90px;
    background:#181818;
    border-top:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
}

audio{
    width:80%;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <div class="logo">Korboify</div>

    <div class="nav-item">🏠 Home</div>
    <div class="nav-item">🔍 Search</div>
    <div class="nav-item">🎵 Songs</div>
    <div class="nav-item">💿 Albums</div>
    <div class="nav-item">❤️ Favorites</div>
    <div class="nav-item">📋 Playlists</div>
</div>

<div class="main">

<input
class="search"
placeholder="Search Korbo Chainz songs..."
onkeyup="searchSongs()"
id="searchBox">

<h2 class="section-title">Popular</h2>

<div class="grid" id="songGrid">

<div class="card songCard">
    <div class="cover">🎤</div>
    <div class="song">My Name's Korbo Chainz</div>
    <div class="artist">Korbo Chainz</div>
</div>

<div class="card songCard">
    <div class="cover">📈</div>
    <div class="song">Trending</div>
    <div class="artist">Korbo Chainz</div>
</div>

<div class="card songCard">
    <div class="cover">🏀</div>
    <div class="song">Fourth Quarter</div>
    <div class="artist">Korbo Chainz</div>
</div>

<div class="card songCard">
    <div class="cover">⭐</div>
    <div class="song">Main Character</div>
    <div class="artist">Korbo Chainz</div>
</div>

</div>

</div>

</div>

<div class="player">
<audio controls>
    <source src="mynameskorbochainz.mp3" type="audio/mpeg">
</audio>
</div>

<script>
function searchSongs() {

let input =
document.getElementById("searchBox")
.value.toLowerCase();

let cards =
document.getElementsByClassName("songCard");

for(let card of cards){

let title =
card.querySelector(".song")
.innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}
else{
card.style.display="none";
}

}
}
</script>

</body>
</html>
</html>
